<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Demo — Mesa de ayuda y tickets</title>
<style>
  :root { --bg:#05070d; --surface:#0a0f1c; --line:#1c2438; --ink:#eef1f7; --muted:#929cb3; --accent:#0891b2; --blue:#4f8cff; --ok:#22c55e; --warn:#f59e0b; --rose:#ff4d7e; }
  * { margin:0; box-sizing:border-box; font-family:system-ui,Segoe UI,sans-serif; }
  body { background:var(--bg); color:var(--ink); }
  .banner { background:var(--accent); color:#fff; text-align:center; font-size:12px; padding:6px; letter-spacing:.08em; }
  header { padding:20px 26px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
  header h1 { font-size:17px; } header h1 b { color:var(--blue); }
  .new { background:var(--blue); color:#fff; border:0; cursor:pointer; font-size:13px; font-weight:600; padding:9px 16px; border-radius:99px; }
  .new:hover { filter:brightness(1.08); }
  .board { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:16px; padding:24px; max-width:1150px; margin:0 auto; }
  .col h2 { font-size:12px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); margin-bottom:12px; display:flex; gap:8px; align-items:center; }
  .dot { width:8px; height:8px; border-radius:99px; }
  .t { background:var(--surface); border:1px solid var(--line); border-left:3px solid var(--blue); border-radius:12px; padding:13px; margin-bottom:10px; }
  .t h3 { font-size:13.5px; } .t p { color:var(--muted); font-size:12px; margin-top:5px; }
  .t .meta { display:flex; justify-content:space-between; align-items:center; margin-top:10px; font-size:11px; color:var(--muted); }
  .t.urg { border-left-color:var(--rose); } .t.med { border-left-color:var(--warn); } .t.done { border-left-color:var(--ok); opacity:.75; }
  .tag { padding:2px 8px; border-radius:99px; font-weight:600; }
  .tag.urg { background:rgba(255,77,126,.14); color:var(--rose); } .tag.med { background:rgba(245,158,11,.14); color:var(--warn); }
  .tag.low { background:rgba(79,140,255,.14); color:var(--blue); } .tag.ok { background:rgba(34,197,94,.14); color:var(--ok); }
  .acts { display:flex; gap:6px; }
  .acts button { background:transparent; border:1px solid var(--line); color:var(--muted); cursor:pointer; width:22px; height:22px; border-radius:6px; font-size:12px; line-height:1; }
  .acts button:hover { border-color:var(--blue); color:var(--ink); }
  .acts button.del:hover { border-color:var(--rose); color:var(--rose); }
  .empty { color:#4a556e; font-size:12px; border:1px dashed var(--line); border-radius:12px; padding:18px; text-align:center; }
  /* modal */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; padding:16px; }
  .overlay.on { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--line); border-radius:16px; width:100%; max-width:420px; padding:22px; }
  .modal h2 { font-size:16px; margin-bottom:16px; }
  .modal label { display:block; font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:6px; }
  .modal input, .modal textarea, .modal select { width:100%; background:var(--bg); border:1px solid var(--line); color:var(--ink); border-radius:10px; padding:10px 12px; font-size:14px; margin-bottom:14px; }
  .modal input:focus, .modal textarea:focus, .modal select:focus { outline:0; border-color:var(--blue); }
  .modal .row { display:flex; gap:10px; justify-content:flex-end; }
  .btn { border:0; cursor:pointer; font-size:13px; font-weight:600; padding:9px 18px; border-radius:99px; }
  .btn.p { background:var(--blue); color:#fff; } .btn.s { background:transparent; color:var(--muted); }
  .reset { background:transparent; border:0; color:#4a556e; cursor:pointer; font-size:11px; text-decoration:underline; }
</style>
</head>
<body>
<div class="banner">DEMO ILUSTRATIVA · SERVICIOS Y DESARROLLO JC</div>
<header>
  <h1>Mesa de ayuda <b>· Soporte TI</b></h1>
  <div style="display:flex;gap:14px;align-items:center">
    <button class="reset" id="reset">Reiniciar demo</button>
    <button class="new" id="nuevo">+ Nuevo ticket</button>
  </div>
</header>
<div class="board" id="board"></div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2>Nuevo ticket</h2>
    <label for="f-title">Título</label>
    <input id="f-title" maxlength="80" placeholder="Ej. Impresora sin conexión">
    <label for="f-desc">Descripción</label>
    <textarea id="f-desc" rows="3" maxlength="200" placeholder="Detalle breve del problema"></textarea>
    <label for="f-prio">Prioridad</label>
    <select id="f-prio">
      <option value="urg">Urgente</option>
      <option value="med" selected>Media</option>
      <option value="low">Baja</option>
    </select>
    <div class="row">
      <button class="btn s" id="cancelar">Cancelar</button>
      <button class="btn p" id="crear">Crear ticket</button>
    </div>
  </div>
</div>

<script>
(function () {
  var KEY = "jc_demo_mesa_ayuda_v1";
  var COLS = [
    { id: "abiertos", label: "Abiertos", color: "var(--rose)" },
    { id: "proceso", label: "En proceso", color: "var(--warn)" },
    { id: "resueltos", label: "Resueltos", color: "var(--ok)" },
  ];
  var PRIO = { urg: ["urg", "Urgente"], med: ["med", "Media"], low: ["low", "Baja"] };
  var MIN = 60000, HOUR = 3600000, DAY = 86400000;

  function seed() {
    var now = Date.now();
    return {
      nextNum: 1043,
      tickets: [
        { id: id(), num: 1042, title: "Caída del sistema de facturación", desc: "Los cajeros no pueden emitir facturas desde las 9:10 am.", prio: "urg", status: "abiertos", at: now - 12 * MIN },
        { id: id(), num: 1041, title: "Impresora de bodega sin conexión", desc: "No responde al ping; se revisó el cable de red.", prio: "med", status: "abiertos", at: now - HOUR },
        { id: id(), num: 1039, title: "Correo corporativo rebota mensajes", desc: "Asignado a Kevin · revisión de registros DNS.", prio: "med", status: "proceso", at: now - 3 * HOUR },
        { id: id(), num: 1037, title: "Acceso nuevo para contadora", desc: "Creación de usuario y permisos del módulo de reportes.", prio: "low", status: "proceso", at: now - DAY },
        { id: id(), num: 1036, title: "Restablecer contraseña de gerencia", desc: "Resuelto por Alejandra · verificado con el usuario.", prio: "med", status: "resueltos", at: now - DAY },
        { id: id(), num: 1033, title: "Actualización de antivirus en 14 equipos", desc: "Despliegue completado sin incidencias.", prio: "low", status: "resueltos", at: now - 2 * DAY },
      ],
    };
  }
  function id() { return Math.random().toString(36).slice(2, 9); }

  var state = load();
  function load() {
    try { var s = JSON.parse(localStorage.getItem(KEY)); if (s && s.tickets) return s; } catch (e) {}
    return seed();
  }
  function save() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) {} }

  function rel(at) {
    var d = Date.now() - at;
    if (d < MIN) return "ahora mismo";
    if (d < HOUR) return "hace " + Math.floor(d / MIN) + " min";
    if (d < DAY) return "hace " + Math.floor(d / HOUR) + " h";
    var days = Math.floor(d / DAY);
    return days === 1 ? "ayer" : "hace " + days + " días";
  }
  function esc(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

  var board = document.getElementById("board");

  function render() {
    board.innerHTML = "";
    COLS.forEach(function (col, ci) {
      var items = state.tickets.filter(function (t) { return t.status === col.id; });
      var div = document.createElement("div");
      div.className = "col";
      var h = '<h2><span class="dot" style="background:' + col.color + '"></span> ' + col.label + " (" + items.length + ")</h2>";
      if (items.length === 0) {
        h += '<div class="empty">Sin tickets</div>';
      } else {
        items.forEach(function (t) {
          var done = col.id === "resueltos";
          var cls = "t " + (done ? "done" : t.prio === "urg" ? "urg" : t.prio === "med" ? "med" : "");
          var tag = done ? '<span class="tag ok">Cerrado</span>' : '<span class="tag ' + PRIO[t.prio][0] + '">' + PRIO[t.prio][1] + "</span>";
          var moves = "";
          if (ci > 0) moves += '<button data-move="' + t.id + '" data-dir="-1" title="Retroceder">‹</button>';
          if (ci < COLS.length - 1) moves += '<button data-move="' + t.id + '" data-dir="1" title="Avanzar">›</button>';
          moves += '<button class="del" data-del="' + t.id + '" title="Eliminar">×</button>';
          h += '<div class="' + cls + '"><h3>#' + t.num + " — " + esc(t.title) + "</h3><p>" + esc(t.desc) + '</p><div class="meta">' + tag + '<span style="display:flex;gap:8px;align-items:center">' + rel(t.at) + '<span class="acts">' + moves + "</span></span></div></div>";
        });
      }
      div.innerHTML = h;
      board.appendChild(div);
    });
  }

  board.addEventListener("click", function (e) {
    var mv = e.target.getAttribute("data-move");
    var dl = e.target.getAttribute("data-del");
    if (mv) {
      var dir = Number(e.target.getAttribute("data-dir"));
      var t = state.tickets.find(function (x) { return x.id === mv; });
      var idx = COLS.findIndex(function (c) { return c.id === t.status; }) + dir;
      if (idx >= 0 && idx < COLS.length) { t.status = COLS[idx].id; t.at = Date.now(); save(); render(); }
    } else if (dl) {
      state.tickets = state.tickets.filter(function (x) { return x.id !== dl; });
      save(); render();
    }
  });

  // modal
  var overlay = document.getElementById("overlay");
  function abrir() { overlay.classList.add("on"); document.getElementById("f-title").focus(); }
  function cerrar() { overlay.classList.remove("on"); document.getElementById("f-title").value = ""; document.getElementById("f-desc").value = ""; }
  document.getElementById("nuevo").addEventListener("click", abrir);
  document.getElementById("cancelar").addEventListener("click", cerrar);
  overlay.addEventListener("click", function (e) { if (e.target === overlay) cerrar(); });
  document.addEventListener("keydown", function (e) { if (e.key === "Escape") cerrar(); });

  document.getElementById("crear").addEventListener("click", function () {
    var title = document.getElementById("f-title").value.trim();
    var desc = document.getElementById("f-desc").value.trim();
    var prio = document.getElementById("f-prio").value;
    if (!title) { document.getElementById("f-title").focus(); return; }
    state.tickets.unshift({ id: id(), num: state.nextNum++, title: title, desc: desc || "Sin descripción.", prio: prio, status: "abiertos", at: Date.now() });
    save(); cerrar(); render();
  });

  document.getElementById("reset").addEventListener("click", function () {
    if (confirm("¿Reiniciar la demo a su estado inicial?")) { state = seed(); save(); render(); }
  });

  render();
})();
</script>
</body>
</html>
